name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: linux
          target: desktop
          arch: gcc_64
          cache: true

      - name: Install build tools
        run: sudo apt-get install -y cmake g++

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Package
        run: tar -czf AndroidBuildTool-linux.tar.gz -C build AndroidBuildTool

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: AndroidBuildTool-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        run: |
          cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path dist
          Copy-Item build\AndroidBuildTool.exe dist\
          windeployqt dist\AndroidBuildTool.exe
          Compress-Archive -Path dist\* -DestinationPath AndroidBuildTool-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: AndroidBuildTool-windows.zip

  build-macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: mac
          target: desktop
          arch: clang_64
          cache: true

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Package
        run: |
          macdeployqt build/AndroidBuildTool.app
          cd build && zip -r ../AndroidBuildTool-macos.zip AndroidBuildTool.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: AndroidBuildTool-macos.zip

  create-release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            linux-build/AndroidBuildTool-linux.tar.gz
            windows-build/AndroidBuildTool-windows.zip
            macos-build/AndroidBuildTool-macos.zip
